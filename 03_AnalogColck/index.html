<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Analog Clock - JavaScript</title>
</head>

<body onload="showTime()">
    <div class="container">
        <div class="clock">

            <div style="--clr:#ff3d58; --h:80px; --w:8px" id="hour" class="hand"><i></i></div>
            <div style="--clr:#00a6ff; --h:100px; --w:6px" id="minute" class="hand"><i></i></div>
            <div style="--clr:#fff; --h:140px; --w:4px" id="second" class="hand"><i></i></div>

            <span style="--n:1"><b>1</b></span>
            <span style="--n:2"><b>2</b></span>
            <span style="--n:3"><b>3</b></span>
            <span style="--n:4"><b>4</b></span>
            <span style="--n:5"><b>5</b></span>
            <span style="--n:6"><b>6</b></span>
            <span style="--n:7"><b>7</b></span>
            <span style="--n:8"><b>8</b></span>
            <span style="--n:9"><b>9</b></span>
            <span style="--n:10"><b>10</b></span>
            <span style="--n:11"><b>11</b></span>
            <span style="--n:12"><b>12</b></span>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
